<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the app draw under the iPhone notch / home bar -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>%APP_NAME%</title>
    <meta name="description" content="%DESCRIPTION%" />

    <!-- theme-color is injected automatically by vite-plugin-pwa (from the
         manifest). The iOS tags below are added here because the plugin
         doesn't emit them. -->

    <!-- iOS: run full-screen when launched from the home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="%SHORT_NAME%" />

    <!-- The manifest link and all icon/splash tags are injected automatically
         by vite-plugin-pwa at build time. -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
